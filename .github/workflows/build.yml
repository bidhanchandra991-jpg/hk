name: ShadowHook Build Artifacts
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install CMake and NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "cmake;3.22.1" "ndk;23.2.8568313"

      - name: Force Change Hardcoded CMake Version
        run: |
          find . -name "build.gradle" -exec sed -i 's/4.0.3/3.22.1/g' {} +
          find . -name "build.gradle.kts" -exec sed -i 's/4.0.3/3.22.1/g' {} +

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build AAR with Gradle
        run: ./gradlew assembleRelease
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/23.2.8568313

      - name: Upload Build Result
        uses: actions/upload-artifact@v4
        with:
          name: shadowhook-release-files
          path: '**/build/outputs/**/*.aar'
