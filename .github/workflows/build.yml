name: ShadowHook Build Artifacts
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Licenses & Install Tools
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "cmake;3.22.1" "ndk;23.2.8568313"

      - name: Force CMake Version (Master Hack)
        run: echo "cmake.dir=$ANDROID_HOME/cmake/3.22.1" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build AAR with Gradle
        run: ./gradlew assembleRelease

      - name: Upload Build Result
        uses: actions/upload-artifact@v4
        with:
          name: shadowhook-release-files
          path: '**/build/outputs/**/*.aar'
