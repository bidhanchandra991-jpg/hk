name: ShadowHook Build Artifacts
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --install "cmake;3.22.1" "ndk;25.2.9519653"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build AAR with Gradle
        run: ./gradlew assembleRelease -Pandroid.extractNativeLibs=false
        env:
          ANDROID_NDK_HOME: ${{ android_home }}/ndk/25.2.9519653

      - name: Upload Build Result
        uses: actions/upload-artifact@v4
        with:
          name: shadowhook-release-files
          path: '**/build/outputs/**/*.aar'
